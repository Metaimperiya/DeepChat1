<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест · Лента</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: system-ui; padding: 20px; max-width: 600px; margin: 0 auto; }
        .post { background: #1a1a2a; padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid #333; }
        .post .author { color: #ffaa44; font-weight: 700; }
        .post .time { color: #666; font-size: 0.7rem; margin-left: 8px; }
        .post .text { margin: 8px 0; }
        .post .footer { display: flex; gap: 16px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #333; flex-wrap: wrap; align-items: center; }
        .post .footer button { background: none; border: none; color: #fff; cursor: pointer; font-size: 0.9rem; padding: 4px 8px; border-radius: 8px; }
        .post .footer button:hover { background: #2a2a3a; }
        .post .footer .liked { color: #ff4757; }
        .comments { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; }
        .comments.open { display: block; }
        .comment { background: #0f0f1a; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #222; }
        .comment .c-author { color: #ffaa44; font-weight: 700; font-size: 0.8rem; }
        .comment .c-time { color: #666; font-size: 0.6rem; margin-left: 6px; }
        .comment .c-text { font-size: 0.85rem; margin: 4px 0; }
        .comment .c-footer { display: flex; gap: 8px; margin-top: 4px; align-items: center; }
        .comment .c-footer button { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 0.7rem; padding: 0 4px; }
        .comment .c-footer .del { color: #ff6666; }
        .comment-form { display: flex; gap: 6px; margin-top: 8px; }
        .comment-form input { flex: 1; padding: 6px 12px; background: #0a0a12; border: 1px solid #333; border-radius: 20px; color: #fff; outline: none; }
        .comment-form button { background: #66aaff; border: none; border-radius: 20px; padding: 4px 16px; font-weight: 700; color: #0b0b0f; cursor: pointer; }
        .admin-form { background: #1a1a2a; padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid #ff8c00; display: none; }
        .admin-form.show { display: block; }
        .admin-form input, .admin-form textarea { width: 100%; padding: 8px; background: #0a0a12; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 6px; }
        .admin-form button { background: #ff8c00; border: none; border-radius: 8px; padding: 8px; font-weight: 700; color: #0b0b0f; cursor: pointer; width: 100%; }
        .dots { position: fixed; bottom: 10px; right: 10px; display: flex; gap: 8px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; }
        .dot.feed { background: rgba(255,140,0,0.2); border-color: rgba(255,140,0,0.3); }
        .dot.feed.active { background: rgba(255,140,0,0.4); border-color: rgba(255,140,0,0.6); }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 999; }
        .modal.open { display: flex; }
        .modal-box { background: #1a1a2a; padding: 24px; border-radius: 16px; max-width: 400px; width: 100%; border: 1px solid #333; }
        .modal-box input { width: 100%; padding: 10px; background: #0a0a12; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 10px; }
        .modal-box .btns { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-box .btns button { padding: 6px 16px; border-radius: 40px; border: none; font-weight: 700; cursor: pointer; }
        .modal-box .btns .cancel { background: #2a2a2a; color: #aaa; }
        .modal-box .btns .ok { background: #ff8c00; color: #0b0b0f; }
    </style>
</head>
<body>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h1 style="color:#ff8c00;">📰 Тест-лента</h1>
        <span id="userLabel" style="color:#666;">👤 Гость</span>
    </div>

    <div id="adminForm" class="admin-form">
        <h3 style="color:#ff8c00;margin-bottom:8px;">✏️ Новый пост</h3>
        <input type="text" id="marqueeInput" placeholder="Бегущая строка">
        <textarea id="textInput" placeholder="Текст поста..."></textarea>
        <input type="url" id="linkInput" placeholder="Ссылка (iframe)">
        <button onclick="submitPost()">📤 Опубликовать</button>
    </div>

    <div id="posts"></div>

    <div class="dots">
        <div class="dot feed" id="feedDot" onclick="openFeedAdmin()"></div>
    </div>

    <div class="modal" id="feedModal">
        <div class="modal-box">
            <h3 style="color:#fff;margin-bottom:4px;">🔑 Вход</h3>
            <p style="color:#666;font-size:0.85rem;margin-bottom:12px;">Пароль для админа ленты</p>
            <input type="password" id="adminPass" placeholder="Пароль...">
            <div class="btns">
                <button class="cancel" onclick="closeModal('feedModal')">Отмена</button>
                <button class="ok" onclick="checkAdmin()">Войти</button>
            </div>
        </div>
    </div>

    <script>
    // FIREBASE
    const config = {
        apiKey: "AIzaSyC81Ow4VPAUcaQGAuJjhtA-OaR8hyqxCtI",
        databaseURL: "https://mychatapp-2c141-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(config);
    const DB = firebase.database();

    const SITE = 'test_site';
    let USER = localStorage.getItem('dc_user') || '';
    let IS_ADMIN = localStorage.getItem('dc_admin') === 'true';

    if (!USER) {
        const n = prompt('👤 Ваше имя:');
        USER = (n && n.trim()) || 'Гость';
        localStorage.setItem('dc_user', USER);
    }
    document.getElementById('userLabel').textContent = '👤 ' + USER;

    if (IS_ADMIN) {
        document.getElementById('adminForm').classList.add('show');
        document.getElementById('feedDot').classList.add('active');
    }

    // ФУНКЦИИ
    function esc(s) { return s ? String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) : ''; }
    function now() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

    // ОТКРЫТЬ/ЗАКРЫТЬ КОММЕНТАРИИ
    window.toggleComments = function(postId) {
        const el = document.getElementById('comments-' + postId);
        const arrow = document.getElementById('arrow-' + postId);
        if (el) {
            el.classList.toggle('open');
            if (arrow) arrow.textContent = el.classList.contains('open') ? '▲' : '▼';
        }
    };

    // ЛАЙК ПОСТА
    window.likePost = function(postId) {
        const key = 'like_' + postId + '_' + USER;
        if (localStorage.getItem(key)) {
            alert('❤️ Вы уже лайкнули этот пост!');
            return;
        }
        if (IS_ADMIN) {
            const cnt = prompt('❤️ Сколько лайков поставить? (1, 10, 100, 500)', '1');
            if (cnt === null) return;
            const num = parseInt(cnt);
            if (isNaN(num) || num < 1) { alert('Введите число'); return; }
            DB.ref('sites/' + SITE + '/posts/' + postId + '/likes').transaction(v => (v || 0) + num);
            return;
        }
        DB.ref('sites/' + SITE + '/posts/' + postId + '/likes').transaction(v => (v || 0) + 1);
        localStorage.setItem(key, 'true');
    };

    // ЛАЙК КОММЕНТАРИЯ
    window.likeComment = function(postId, commentId) {
        const key = 'clike_' + commentId + '_' + USER;
        if (localStorage.getItem(key)) {
            alert('❤️ Вы уже лайкнули этот комментарий!');
            return;
        }
        if (IS_ADMIN) {
            const cnt = prompt('❤️ Сколько лайков на комментарий? (1, 10, 100, 500)', '1');
            if (cnt === null) return;
            const num = parseInt(cnt);
            if (isNaN(num) || num < 1) { alert('Введите число'); return; }
            DB.ref('sites/' + SITE + '/posts/' + postId + '/comments/' + commentId + '/likes').transaction(v => (v || 0) + num);
            return;
        }
        DB.ref('sites/' + SITE + '/posts/' + postId + '/comments/' + commentId + '/likes').transaction(v => (v || 0) + 1);
        localStorage.setItem(key, 'true');
    };

    // ОТПРАВИТЬ КОММЕНТАРИЙ
    window.sendComment = function(postId) {
        const input = document.getElementById('commentInput-' + postId);
        if (!input) return;
        const text = input.value.trim();
        if (!text) { alert('Напишите комментарий'); return; }
        DB.ref('sites/' + SITE + '/posts/' + postId + '/comments').push({
            nick: USER,
            text: text,
            time: now(),
            timestamp: Date.now(),
            likes: 0
        }).then(() => { input.value = ''; });
    };

    // УДАЛИТЬ КОММЕНТАРИЙ
    window.deleteComment = function(postId, commentId) {
        if (!confirm('Удалить комментарий?')) return;
        DB.ref('sites/' + SITE + '/posts/' + postId + '/comments/' + commentId).remove();
    };

    // АДМИН
    window.openFeedAdmin = function() {
        document.getElementById('feedModal').classList.add('open');
        document.getElementById('adminPass').value = '';
        document.getElementById('adminPass').focus();
    };

    window.checkAdmin = function() {
        const pass = document.getElementById('adminPass').value.trim();
        if (pass === '12345') {
            IS_ADMIN = true;
            localStorage.setItem('dc_admin', 'true');
            document.getElementById('adminForm').classList.add('show');
            document.getElementById('feedDot').classList.add('active');
            closeModal('feedModal');
            alert('✅ Админ включён!');
            loadPosts();
        } else {
            alert('❌ Неверный пароль!');
            document.getElementById('adminPass').value = '';
        }
    };

    window.closeModal = function(id) {
        document.getElementById(id).classList.remove('open');
    };

    // ОТПРАВИТЬ ПОСТ
    window.submitPost = function() {
        if (!IS_ADMIN) { alert('Только админ!'); return; }
        const marquee = document.getElementById('marqueeInput').value.trim();
        const text = document.getElementById('textInput').value.trim();
        const link = document.getElementById('linkInput').value.trim();
        if (!text && !link) { alert('Введите текст или ссылку'); return; }
        DB.ref('sites/' + SITE + '/posts').push({
            author: USER,
            text: text || '📝',
            time: now(),
            timestamp: Date.now(),
            marquee: marquee || null,
            link: link || null,
            likes: 0
        }).then(() => {
            document.getElementById('marqueeInput').value = '';
            document.getElementById('textInput').value = '';
            document.getElementById('linkInput').value = '';
        });
    };

    // ЗАГРУЗКА ПОСТОВ
    function loadPosts() {
        const postsRef = DB.ref('sites/' + SITE + '/posts');
        postsRef.orderByChild('timestamp').on('value', snap => {
            const container = document.getElementById('posts');
            container.innerHTML = '';
            const data = snap.val() || {};
            const keys = Object.keys(data).sort((a, b) => (data[b].timestamp || 0) - (data[a].timestamp || 0));
            if (!keys.length) {
                container.innerHTML = '<div style="text-align:center;color:#444;padding:40px;">📭 Нет постов</div>';
                return;
            }
            keys.forEach(key => {
                const post = data[key];
                container.appendChild(renderPost(post, key));
            });
        });
    }

    function renderPost(post, postId) {
        const div = document.createElement('div');
        div.className = 'post';

        const isLiked = localStorage.getItem('like_' + postId + '_' + USER) === 'true';

        div.innerHTML = `
            ${post.marquee ? `<div style="background:#0f0f1a;padding:4px 0;overflow:hidden;white-space:nowrap;border-radius:6px;margin-bottom:6px;border:1px solid #222;"><span style="display:inline-block;animation:scroll 10s linear infinite;color:#ff8c00;font-weight:600;font-size:0.85rem;padding-left:16px;">${esc(post.marquee)}</span></div>` : ''}
            <div><span class="author">${esc(post.author)}</span><span class="time">${post.time || ''}</span></div>
            <div class="text">${esc(post.text)}</div>
            ${post.link ? `<div style="margin:6px 0;border:1px solid #333;border-radius:8px;overflow:hidden;"><iframe src="${esc(post.link)}" style="width:100%;height:200px;border:none;"></iframe></div>` : ''}
            <div class="footer">
                <button class="${isLiked ? 'liked' : ''}" onclick="likePost('${postId}')">❤️ <span id="likes-${postId}">${post.likes || 0}</span></button>
                <button onclick="toggleComments('${postId}')">💬 <span id="ccount-${postId}">0</span> <span id="arrow-${postId}">▼</span></button>
                ${IS_ADMIN ? `<button style="color:#ff6666;" onclick="if(confirm('Удалить пост?')){DB.ref('sites/'+SITE+'/posts/'+'${postId}').remove();}">🗑</button>` : ''}
            </div>
            <div class="comments" id="comments-${postId}">
                <div class="comment-form">
                    <input type="text" id="commentInput-${postId}" placeholder="Написать комментарий...">
                    <button onclick="sendComment('${postId}')">➤</button>
                </div>
                <div id="commentsList-${postId}"></div>
            </div>
        `;

        // Подписываемся на лайки поста
        DB.ref('sites/' + SITE + '/posts/' + postId + '/likes').on('value', snap => {
            const el = document.getElementById('likes-' + postId);
            if (el) el.textContent = snap.val() || 0;
        });

        // Подписываемся на комментарии
        const commentsRef = DB.ref('sites/' + SITE + '/posts/' + postId + '/comments');
        commentsRef.on('value', snap => {
            const data = snap.val() || {};
            const keys = Object.keys(data);
            const countEl = document.getElementById('ccount-' + postId);
            if (countEl) countEl.textContent = keys.length;

            const list = document.getElementById('commentsList-' + postId);
            if (!list) return;
            list.innerHTML = '';
            if (!keys.length) {
                list.innerHTML = '<div style="color:#444;font-size:0.8rem;padding:4px 0;">Нет комментариев</div>';
                return;
            }
            keys.sort((a, b) => (data[a].timestamp || 0) - (data[b].timestamp || 0));
            keys.forEach(key => {
                const c = data[key];
                const cDiv = document.createElement('div');
                cDiv.className = 'comment';
                const isCLiked = localStorage.getItem('clike_' + key + '_' + USER) === 'true';
                let actions = '';
                if (c.nick === USER || IS_ADMIN) {
                    actions = `<button class="del" onclick="deleteComment('${postId}','${key}')">🗑</button>`;
                }
                cDiv.innerHTML = `
                    <div><span class="c-author">${esc(c.nick)}</span><span class="c-time">${c.time || ''}</span></div>
                    <div class="c-text">${esc(c.text)}</div>
                    <div class="c-footer">
                        <button class="${isCLiked ? 'liked' : ''}" onclick="likeComment('${postId}','${key}')">❤️ <span id="clikes-${key}">${c.likes || 0}</span></button>
                        ${actions}
                    </div>
                `;
                list.appendChild(cDiv);

                // Подписываемся на лайки комментария
                DB.ref('sites/' + SITE + '/posts/' + postId + '/comments/' + key + '/likes').on('value', snap => {
                    const el = document.getElementById('clikes-' + key);
                    if (el) el.textContent = snap.val() || 0;
                });
            });
        });

        return div;
    }

    // Стиль для анимации бегущей строки
    const style = document.createElement('style');
    style.textContent = `@keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }`;
    document.head.appendChild(style);

    // ЗАПУСК
    loadPosts();

    console.log('🚀 Тест-лента загружена!');
    console.log('👤 Пользователь:', USER);
    console.log('🔑 Админ пароль: 12345');
    </script>
</body>
</html>
