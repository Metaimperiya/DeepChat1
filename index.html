<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepFeed</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a1a;color:#eee;font-family:Arial,sans-serif;padding:10px;max-width:700px;margin:0 auto}
        .header{background:#2a2a2a;padding:10px;border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
        .header h1{font-size:20px}
        .header h1 span{color:#ff8c00}
        .user{background:#3a3a3a;padding:4px 12px;border-radius:20px;font-size:14px}
        .admin-badge{display:none;background:#ff8c00;color:#000;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:bold;margin-right:8px}
        .admin-badge.show{display:inline-block}
        
        .post{background:#2a2a2a;border-radius:8px;padding:12px;margin-bottom:10px;border:1px solid #3a3a3a}
        .post-header{display:flex;justify-content:space-between;margin-bottom:4px}
        .post-author{color:#ffaa44;font-weight:bold}
        .post-time{color:#888;font-size:12px}
        .post-text{margin:6px 0;line-height:1.4}
        .post-tags{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
        .post-tags span{background:#1a1a1a;color:#66aaff;padding:0 8px;border-radius:12px;border:1px solid #333;font-size:12px}
        .post-buttons{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
        .post-buttons a{background:#0088cc;color:#fff;padding:4px 14px;border-radius:20px;text-decoration:none;font-size:13px;font-weight:bold}
        .post-buttons a:hover{background:#00a3e0}
        .post-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid #3a3a3a}
        .post-actions button{background:#3a3a3a;border:0;color:#eee;padding:3px 12px;border-radius:20px;cursor:pointer;font-size:12px}
        .post-actions button:hover{background:#4a4a4a}
        .post-actions .del{background:#5c1a1a;color:#ff8888}
        .post-actions .del:hover{background:#7a2222}
        .post-actions .edit{background:#0088cc;color:#fff}
        .post-actions .edit:hover{background:#00a3e0}
        .post-actions .pin{background:#ff8c00;color:#000}
        .post-actions .pin:hover{background:#ffa033}
        .pinned{border-color:#ff8c00}
        .marquee{background:#1a1a1a;padding:3px 0;overflow:hidden;white-space:nowrap;border-radius:4px;margin-bottom:4px;border:1px solid #333}
        .marquee span{display:inline-block;animation:scroll 12s linear infinite;color:#ff8c00;font-weight:bold;padding-left:14px}
        @keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
        .empty{text-align:center;padding:40px;color:#555}
        
        .admin-form{display:none;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:10px}
        .admin-form.show{display:block}
        .admin-form input,.admin-form textarea{width:100%;padding:6px 10px;background:#2a2a2a;border:0;border-radius:4px;color:#fff;margin-bottom:4px;font-family:inherit}
        .admin-form textarea{min-height:40px;resize:vertical}
        .admin-form .row{display:flex;gap:4px;margin:2px 0}
        .admin-form .row input{flex:1;margin-bottom:0}
        .admin-form .row button{background:#5c1a1a;color:#ff8888;border:0;border-radius:4px;padding:0 8px;cursor:pointer}
        .admin-form .actions{display:flex;gap:4px;margin-top:6px}
        .admin-form .actions button{padding:4px 16px;border-radius:20px;border:0;font-weight:bold;cursor:pointer}
        .admin-form .submit{background:#ff8c00;color:#000}
        .admin-form .submit:hover{background:#ffa033}
        .admin-form .cancel{background:#3a3a3a;color:#aaa}
        .admin-form .cancel:hover{background:#4a4a4a}
        .admin-form .add-btn{background:#3a3a3a;color:#fff;border:0;padding:2px 12px;border-radius:20px;cursor:pointer;font-size:12px;margin:2px 0}
        
        .admin-dot{position:fixed;bottom:10px;right:10px;width:14px;height:14px;border-radius:50%;background:#3a3a3a;border:2px solid #555;cursor:pointer}
        .admin-dot.active{background:#ff8c00;border-color:#ff8c00}
        
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:999;justify-content:center;align-items:center;padding:16px}
        .modal.open{display:flex}
        .modal-box{background:#2a2a2a;border-radius:10px;padding:16px;max-width:320px;width:100%;border:1px solid #444}
        .modal-box h3{margin-bottom:4px}
        .modal-box .sub{color:#888;font-size:13px;margin-bottom:10px}
        .modal-box input{width:100%;padding:6px 10px;background:#1a1a1a;border:0;border-radius:4px;color:#fff;margin-bottom:6px}
        .modal-box .btns{display:flex;gap:6px;justify-content:flex-end}
        .modal-box .btns button{padding:4px 16px;border-radius:20px;border:0;font-weight:bold;cursor:pointer}
        .modal-box .btns .cancel{background:#3a3a3a;color:#aaa}
        .modal-box .btns .cancel:hover{background:#4a4a4a}
        .modal-box .btns .save{background:#ff8c00;color:#000}
        .modal-box .btns .save:hover{background:#ffa033}
    </style>
</head>
<body>

<div class="header">
    <h1>Deep<span>Feed</span></h1>
    <div>
        <span class="admin-badge" id="adminBadge">Админ</span>
        <span class="user" id="userLabel">Гость</span>
    </div>
</div>

<div class="admin-form" id="adminForm">
    <div style="color:#ff8c00;font-weight:bold;margin-bottom:4px;">Новый пост</div>
    <input type="text" id="fMarquee" placeholder="Бегущая строка">
    <textarea id="fText" placeholder="Текст поста"></textarea>
    <input type="text" id="fLink" placeholder="Ссылка (iframe)">
    <input type="text" id="fHashtags" placeholder="#хештеги через пробел">
    <div style="color:#888;font-size:12px;margin:2px 0;">Кнопки</div>
    <div id="fBtns"></div>
    <button class="add-btn" onclick="addBtn()">+ Кнопку</button>
    <div class="actions">
        <button class="submit" id="fSubmit" onclick="submitPost()">Опубликовать</button>
        <button class="cancel" onclick="cancelForm()">Отмена</button>
    </div>
</div>

<div id="feedPosts"></div>

<div class="admin-dot" id="adminDot" onclick="openLogin()"></div>

<div class="modal" id="loginModal">
    <div class="modal-box">
        <h3>Вход для админа</h3>
        <div class="sub">Пароль: 12345</div>
        <input type="password" id="loginPass" placeholder="Пароль">
        <div class="btns">
            <button class="cancel" onclick="closeModal('loginModal')">Отмена</button>
            <button class="save" onclick="checkLogin()">Войти</button>
        </div>
    </div>
</div>

<script>
// FIREBASE
const config = {
    apiKey:"AIzaSyC81Ow4VPAUcaQGAuJjhtA-OaR8hyqxCtI",
    authDomain:"mychatapp-2c141.firebaseapp.com",
    databaseURL:"https://mychatapp-2c141-default-rtdb.firebaseio.com",
    projectId:"mychatapp-2c141",
    storageBucket:"mychatapp-2c141.firebasestorage.app",
    messagingSenderId:"857322151793",
    appId:"1:857322151793:web:387599e9e6f9cf1454a0d0"
};
firebase.initializeApp(config);
const db = firebase.database();
const SITE = location.hostname.replace(/\./g,'_');

// USER
let user = localStorage.getItem('user_'+SITE) || '';
if(!user){
    user = prompt('Ваше имя:') || 'Гость';
    localStorage.setItem('user_'+SITE, user);
}
document.getElementById('userLabel').textContent = user;

let isAdmin = localStorage.getItem('admin_'+SITE) === '1';
let editId = null;

if(isAdmin){
    document.getElementById('adminBadge').classList.add('show');
    document.getElementById('adminDot').classList.add('active');
    document.getElementById('adminForm').classList.add('show');
}

function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function now(){ return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

// LOGIN
window.openLogin = function(){
    document.getElementById('loginModal').classList.add('open');
    document.getElementById('loginPass').value = '';
};
window.closeModal = function(id){
    document.getElementById(id).classList.remove('open');
};
window.checkLogin = function(){
    if(document.getElementById('loginPass').value === '12345'){
        isAdmin = true;
        localStorage.setItem('admin_'+SITE, '1');
        document.getElementById('adminBadge').classList.add('show');
        document.getElementById('adminDot').classList.add('active');
        document.getElementById('adminForm').classList.add('show');
        closeModal('loginModal');
        loadFeed();
    }else alert('Неверный пароль!');
};

// LOAD FEED
function loadFeed(){
    db.ref('sites/'+SITE+'/posts').orderByChild('time').on('value', snap => {
        const container = document.getElementById('feedPosts');
        container.innerHTML = '';
        const data = snap.val() || {};
        const keys = Object.keys(data).sort((a,b) => (data[b].ts||0) - (data[a].ts||0));
        if(!keys.length){
            container.innerHTML = '<div class="empty">Нет постов</div>';
            return;
        }
        keys.forEach(k => {
            const p = data[k];
            p.id = k;
            container.appendChild(renderPost(p));
        });
    });
}

function renderPost(p){
    const div = document.createElement('div');
    div.className = 'post';
    if(p.pinned) div.classList.add('pinned');
    
    let html = '';
    if(p.marquee) html += `<div class="marquee"><span>${esc(p.marquee)}</span></div>`;
    html += `<div class="post-header"><span class="post-author">${esc(p.author)}</span><span class="post-time">${p.time||''}</span></div>`;
    html += `<div class="post-text">${esc(p.text||'')}</div>`;
    
    if(p.tags && p.tags.length){
        html += '<div class="post-tags">' + p.tags.map(t => `<span>${esc(t)}</span>`).join('') + '</div>';
    }
    
    if(p.buttons && p.buttons.length){
        html += '<div class="post-buttons">' + p.buttons.filter(b=>b.url).map(b => `<a href="${esc(b.url)}" target="_blank">${esc(b.label||'Перейти')}</a>`).join('') + '</div>';
    }
    
    if(p.link){
        html += `<div style="border:1px solid #333;border-radius:6px;overflow:hidden;margin:4px 0;"><iframe src="${esc(p.link)}" style="width:100%;height:180px;border:0;"></iframe></div>`;
    }
    
    // Кнопки
    html += '<div class="post-actions">';
    html += `<button onclick="likePost('${p.id}')">❤️ ${p.likes||0}</button>`;
    html += `<button onclick="alert('Обсуждение поста')">💬</button>`;
    html += `<button onclick="repost('${p.id}')">🔄</button>`;
    html += `<button onclick="alert('Ссылка скопирована')">📎</button>`;
    
    if(isAdmin){
        html += `<button class="edit" onclick="editPost('${p.id}')">✏️</button>`;
        html += `<button class="del" onclick="deletePost('${p.id}')">🗑</button>`;
        html += `<button class="pin" onclick="togglePin('${p.id}')">${p.pinned?'📌':'📌'}</button>`;
    }
    html += '</div>';
    
    div.innerHTML = html;
    return div;
}

// ДЕЙСТВИЯ
window.likePost = function(id){
    const key = 'like_'+id+'_'+user;
    if(localStorage.getItem(key)) return;
    db.ref('sites/'+SITE+'/posts/'+id+'/likes').transaction(v => (v||0)+1);
    localStorage.setItem(key, '1');
};

window.repost = function(id){
    db.ref('sites/'+SITE+'/posts/'+id).once('value', snap => {
        const p = snap.val();
        if(!p) return;
        const repost = {...p, author: user+' (репост)', time: now(), ts: Date.now()};
        delete repost.id;
        db.ref('sites/'+SITE+'/posts').push(repost);
        alert('Репост создан');
    });
};

window.deletePost = function(id){
    if(!confirm('Удалить пост?')) return;
    db.ref('sites/'+SITE+'/posts/'+id).remove();
};

window.togglePin = function(id){
    db.ref('sites/'+SITE+'/posts/'+id).once('value', snap => {
        const p = snap.val();
        if(!p) return;
        db.ref('sites/'+SITE+'/posts/'+id+'/pinned').set(!p.pinned);
    });
};

// ФОРМА
window.addBtn = function(l='', u=''){
    const c = document.getElementById('fBtns');
    const d = document.createElement('div');
    d.className = 'row';
    d.innerHTML = `<input placeholder="Текст" value="${esc(l)}"><input placeholder="Ссылка" value="${esc(u)}"><button onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(d);
};

window.submitPost = function(){
    const marquee = document.getElementById('fMarquee').value.trim();
    const text = document.getElementById('fText').value.trim();
    const link = document.getElementById('fLink').value.trim();
    const tags = document.getElementById('fHashtags').value.trim().split(/\s+/).filter(t => t.startsWith('#')).slice(0,5);
    if(!text && !link){ alert('Введите текст или ссылку'); return; }
    
    const buttons = [];
    document.querySelectorAll('#fBtns .row').forEach(row => {
        const inputs = row.querySelectorAll('input');
        if(inputs[1].value.trim()) buttons.push({label: inputs[0].value.trim()||'Перейти', url: inputs[1].value.trim()});
    });
    
    const post = {
        author: user,
        text: text || '📝',
        time: now(),
        ts: Date.now(),
        marquee: marquee || null,
        link: link || null,
        buttons: buttons,
        tags: tags,
        likes: 0,
        pinned: false
    };
    
    const ref = db.ref('sites/'+SITE+'/posts');
    if(editId){
        ref.child(editId).update(post).then(cancelForm);
    }else{
        ref.push(post).then(cancelForm);
    }
};

window.cancelForm = function(){
    ['fMarquee','fText','fLink','fHashtags'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fBtns').innerHTML = '';
    document.getElementById('fSubmit').textContent = 'Опубликовать';
    editId = null;
};

window.editPost = function(id){
    editId = id;
    db.ref('sites/'+SITE+'/posts/'+id).once('value', snap => {
        const p = snap.val();
        if(!p) return;
        document.getElementById('fMarquee').value = p.marquee || '';
        document.getElementById('fText').value = p.text || '';
        document.getElementById('fLink').value = p.link || '';
        document.getElementById('fHashtags').value = (p.tags||[]).join(' ');
        document.getElementById('fBtns').innerHTML = '';
        (p.buttons||[]).forEach(b => addBtn(b.label, b.url));
        document.getElementById('fSubmit').textContent = 'Обновить';
        document.getElementById('adminForm').scrollIntoView({behavior:'smooth'});
    });
};

// ЗАПУСК
loadFeed();

// Примеры если пусто
db.ref('sites/'+SITE+'/posts').once('value', snap => {
    if(snap.exists()) return;
    const ex = [
        {author:'Admin', text:'Добро пожаловать в DeepFeed!', time:'12:00', ts:Date.now()-3600000, marquee:'🌟 Привет всем!', link:null, buttons:[{label:'Правила', url:'#'}], tags:['#Привет'], likes:3, pinned:false},
        {author:'Модератор', text:'Завтра встреча в 19:00', time:'11:30', ts:Date.now()-7200000, marquee:'📅 Встреча!', link:null, buttons:[{label:'Подключиться', url:'https://meet.google.com/'}], tags:['#Встреча'], likes:5, pinned:false}
    ];
    ex.forEach(p => db.ref('sites/'+SITE+'/posts').push(p));
});

</script>
</body>
</html>
