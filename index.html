<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepFeed · Лента</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#18191a;color:#e4e6eb;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:10px;max-width:700px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 12px;border-bottom:1px solid #3a3b3c;margin-bottom:14px}
        .logo{font-weight:800;font-size:20px;display:flex;align-items:center;gap:6px}
        .logo span{color:#0088cc}
        .badge{background:#0088cc;color:#fff;font-size:10px;padding:0 10px;border-radius:30px;font-weight:600;margin-left:4px}
        .user{font-size:14px;color:#b0b3b8;background:#2d2d2f;padding:4px 14px;border-radius:30px}
        .admin-badge{display:none;font-size:11px;color:#ff8c00;background:rgba(255,140,0,.15);padding:2px 12px;border-radius:30px;border:1px solid rgba(255,140,0,.2);margin-right:6px}
        .admin-badge.show{display:inline-block}
        .post{background:#242526;border:1px solid #3a3b3c;border-radius:14px;padding:14px;margin-bottom:14px}
        .post-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
        .post-author{color:#e4e6eb;font-weight:700;font-size:15px}
        .post-time{color:#888;font-size:12px}
        .post-marquee{background:#18191a;padding:4px 0;overflow:hidden;white-space:nowrap;border-radius:6px;margin-bottom:6px;border:1px solid #3a3b3c}
        .post-marquee span{display:inline-block;animation:scroll 14s linear infinite;color:#ff8c00;font-weight:600;font-size:14px;padding-left:14px}
        @keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
        .post-text{word-break:break-word;margin:6px 0;line-height:1.5;font-size:15px}
        .post-img{max-width:100%;max-height:280px;border-radius:10px;margin:6px 0;border:1px solid #3a3b3c;cursor:pointer}
        .post-frame{border:1px solid #3a3b3c;border-radius:10px;overflow:hidden;margin:6px 0}
        .post-frame iframe{width:100%;height:220px;border:0}
        .post-buttons{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
        .post-buttons a{background:#0088cc;color:#fff;padding:6px 18px;border-radius:30px;text-decoration:none;font-weight:600;font-size:14px}
        .post-buttons a:hover{background:#00a3e0}
        .post-tags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
        .post-tags span{color:#66aaff;background:#18191a;padding:0 12px;border-radius:20px;border:1px solid #3a3b3c;font-size:12px}
        .post-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid #3a3b3c}
        .post-actions button{background:#3a3b3c;border:0;color:#e4e6eb;padding:4px 16px;border-radius:30px;font-size:13px;cursor:pointer}
        .post-actions button:hover{background:#4e4f50}
        .post-actions .danger{background:#5c1a1a;color:#ff8888}
        .post-actions .danger:hover{background:#7a2222}
        .post-actions .primary{background:#0088cc;color:#fff}
        .post-actions .primary:hover{background:#00a3e0}
        .empty{text-align:center;padding:50px 20px;color:#555;font-size:16px}
        /* admin form */
        .admin-form{display:none;background:#18191a;border:1px solid #3a3b3c;border-radius:12px;padding:14px;margin-bottom:14px}
        .admin-form.show{display:block}
        .admin-form .title{color:#ff8c00;font-weight:700;font-size:16px;margin-bottom:6px}
        .admin-form input,.admin-form textarea{width:100%;padding:8px 12px;background:#3a3b3c;border:0;border-radius:8px;color:#fff;font-size:14px;margin-bottom:6px;font-family:inherit}
        .admin-form textarea{min-height:52px;resize:vertical}
        .admin-form .btn-row{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0}
        .admin-form .btn-row input{flex:1;min-width:70px;margin-bottom:0}
        .admin-form .row-actions{display:flex;gap:6px;margin-top:6px}
        .admin-form .row-actions button{padding:6px 20px;border-radius:30px;border:0;font-weight:600;cursor:pointer;font-size:14px}
        .admin-form .submit{background:#ff8c00;color:#111}
        .admin-form .submit:hover{background:#ffa033}
        .admin-form .cancel{background:#3a3b3c;color:#b0b3b8}
        .admin-form .cancel:hover{background:#4e4f50}
        .admin-form .add-btn{background:#3a3b3c;border:0;color:#fff;padding:2px 16px;border-radius:30px;cursor:pointer;font-size:13px}
        .admin-form .remove-btn{background:#5c1a1a;color:#ff8888;border:0;border-radius:30px;padding:0 12px;cursor:pointer;font-size:13px}
        /* admin dot */
        .admin-dot{position:fixed;bottom:14px;right:14px;width:16px;height:16px;border-radius:50%;border:2px solid #3a3b3c;cursor:pointer;background:rgba(255,140,0,.1);border-color:rgba(255,140,0,.2);transition:.2s;z-index:999}
        .admin-dot.active{background:rgba(255,140,0,.3);border-color:#ff8c00}
        /* modal */
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:2000;justify-content:center;align-items:center;padding:16px}
        .modal.open{display:flex}
        .modal-box{background:#242526;border-radius:16px;padding:20px;max-width:360px;width:100%;border:1px solid #3a3b3c}
        .modal-box h3{color:#fff;margin-bottom:4px}
        .modal-box .sub{color:#888;font-size:14px;margin-bottom:12px}
        .modal-box input{width:100%;padding:8px 12px;background:#3a3b3c;border:0;border-radius:8px;color:#fff;font-size:14px;margin-bottom:8px}
        .modal-box .mbtns{display:flex;gap:8px;justify-content:flex-end}
        .modal-box .mbtns button{padding:6px 18px;border-radius:30px;border:0;font-weight:600;cursor:pointer}
        .modal-box .mbtns .cancel{background:#3a3b3c;color:#b0b3b8}
        .modal-box .mbtns .cancel:hover{background:#4e4f50}
        .modal-box .mbtns .save{background:#ff8c00;color:#111}
        .modal-box .mbtns .save:hover{background:#ffa033}
        /* edit modal */
        .edit-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:2000;justify-content:center;align-items:center;padding:12px}
        .edit-overlay.open{display:flex}
        .edit-box{background:#242526;border-radius:14px;padding:16px;max-width:400px;width:100%;border:1px solid #3a3b3c;max-height:90vh;overflow-y:auto}
        .edit-box h2{color:#ff8c00;font-size:16px;margin-bottom:6px}
        .edit-box input,.edit-box textarea{width:100%;padding:6px 10px;background:#3a3b3c;border:0;border-radius:6px;color:#fff;font-size:13px;margin-bottom:4px;font-family:inherit;resize:vertical}
        .edit-box textarea{min-height:36px}
        .edit-box .ebtn-row{display:flex;gap:4px;margin-bottom:3px}
        .edit-box .ebtn-row input{flex:1;margin-bottom:0}
        .edit-box .ebtn-rem{background:#5c1a1a;color:#ff8888;border:0;border-radius:4px;padding:0 10px;cursor:pointer}
        .edit-box .eactions{display:flex;gap:6px;margin-top:6px}
        .edit-box .eactions button{padding:6px;border-radius:30px;border:0;font-weight:600;flex:1;cursor:pointer}
        .edit-box .eactions .save{background:#ff8c00;color:#111}
        .edit-box .eactions .save:hover{background:#ffa033}
        .edit-box .eactions .close{background:#3a3b3c;color:#b0b3b8}
        .edit-box .eactions .close:hover{background:#4e4f50}
        .edit-box .edelete{width:100%;background:#5c1a1a;color:#ff8888;border:0;border-radius:30px;padding:6px;font-weight:600;margin-top:6px;cursor:pointer}
        .edit-box .edelete:hover{background:#7a2222}
        .scroll::-webkit-scrollbar{width:4px}
        .scroll::-webkit-scrollbar-thumb{background:#3a3b3c;border-radius:4px}
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">Deep<span>Feed</span><span class="badge">BETA</span></div>
    <div style="display:flex;align-items:center;gap:6px;">
        <span class="admin-badge" id="adminBadge">📰 Админ</span>
        <span class="user" id="userLabel">👤 Гость</span>
    </div>
</div>

<!-- ADMIN FORM -->
<div class="admin-form" id="adminForm">
    <div class="title">✏️ Новый пост</div>
    <input type="text" id="fMarquee" placeholder="📢 Бегущая строка">
    <textarea id="fText" placeholder="📝 Текст поста..."></textarea>
    <input type="url" id="fLink" placeholder="🔗 Ссылка (iframe)">
    <input type="text" id="fHashtags" placeholder="#хештеги через пробел">
    <div style="color:#888;font-size:13px;margin:4px 0;">🔘 Кнопки</div>
    <div id="fBtns"></div>
    <button class="add-btn" onclick="fAddBtn()">➕ Кнопку</button>
    <div class="row-actions">
        <button class="submit" id="fSubmitBtn" onclick="fSubmit()">📤 Опубликовать</button>
        <button class="cancel" onclick="fCancel()">✕ Отмена</button>
    </div>
</div>

<!-- POSTS -->
<div id="feedPosts"></div>

<!-- ADMIN DOT -->
<div class="admin-dot" id="adminDot" onclick="openLogin()"></div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
    <div class="modal-box">
        <h3>🔐 Вход для админа</h3>
        <div class="sub">Введите пароль для управления лентой</div>
        <input type="password" id="loginPass" placeholder="Пароль...">
        <div class="mbtns">
            <button class="cancel" onclick="closeModal('loginModal')">Отмена</button>
            <button class="save" onclick="checkPass()">Войти</button>
        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="edit-overlay" id="editOverlay">
    <div class="edit-box">
        <h2>✏️ Редактировать</h2>
        <input type="text" id="editMarquee" placeholder="Бегущая строка">
        <textarea id="editText" placeholder="Текст..."></textarea>
        <input type="url" id="editLink" placeholder="Ссылка (iframe)">
        <input type="text" id="editHashtags" placeholder="#хештеги через пробел">
        <div style="color:#888;font-size:12px;margin:3px 0;">Кнопки</div>
        <div id="editBtns"></div>
        <button onclick="editAddBtn()" style="background:#3a3b3c;border:0;color:#fff;padding:2px 16px;border-radius:30px;cursor:pointer;font-size:13px;margin-bottom:4px;">➕ Кнопку</button>
        <div class="eactions">
            <button class="save" onclick="doSaveEdit()">💾 Сохранить</button>
            <button class="close" onclick="closeEdit()">✕ Отмена</button>
        </div>
        <button class="edelete" onclick="doDeleteEdit()">🗑 Удалить</button>
    </div>
</div>

<!-- =============================================================== -->
<script>
(function(){

// ── FIREBASE ──
const FB_CONFIG = {
    apiKey:"AIzaSyC81Ow4VPAUcaQGAuJjhtA-OaR8hyqxCtI",
    authDomain:"mychatapp-2c141.firebaseapp.com",
    databaseURL:"https://mychatapp-2c141-default-rtdb.firebaseio.com",
    projectId:"mychatapp-2c141",
    storageBucket:"mychatapp-2c141.firebasestorage.app",
    messagingSenderId:"857322151793",
    appId:"1:857322151793:web:387599e9e6f9cf1454a0d0"
};
const fbApp = firebase.initializeApp(FB_CONFIG);
const db = firebase.database(fbApp);
const SITE = (window.location.hostname||'local').replace(/\./g,'_');

// ── USER ──
let USER = localStorage.getItem('dc_u_'+SITE)||'';
let IS_ADMIN = localStorage.getItem('dc_fa_'+SITE)==='1';
let EDIT_ID = null;

if(!USER){
    const n = prompt('👤 Ваше имя:');
    USER = (n&&n.trim()) ? n.trim().slice(0,24) : 'Гость';
    localStorage.setItem('dc_u_'+SITE, USER);
}
document.getElementById('userLabel').textContent='👤 '+USER;

function applyAdminUI(){
    if(IS_ADMIN){
        document.getElementById('adminBadge').classList.add('show');
        document.getElementById('adminDot').classList.add('active');
        document.getElementById('adminForm').classList.add('show');
    }
}
applyAdminUI();

// ── UTILS ──
const esc=s=>s?String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])):'';
const now=()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

// ── LOGIN ──
window.openLogin=function(){
    document.getElementById('loginModal').classList.add('open');
    document.getElementById('loginPass').value='';
    document.getElementById('loginPass').focus();
};
window.closeModal=function(id){document.getElementById(id).classList.remove('open');};
window.checkPass=function(){
    if(document.getElementById('loginPass').value.trim()==='12345'){
        IS_ADMIN=true;
        localStorage.setItem('dc_fa_'+SITE,'1');
        applyAdminUI();
        closeModal('loginModal');
        loadFeed();
    }else alert('❌ Неверный пароль!');
};

// ═══════════════════════════════════════════
// ══  FEED  ══════════════════════════════════
// ═══════════════════════════════════════════

function loadFeed(){
    db.ref('sites/'+SITE+'/feed_posts').orderByChild('timestamp').on('value',snap=>{
        const c=document.getElementById('feedPosts');
        c.innerHTML='';
        const data=snap.val()||{};
        const keys=Object.keys(data).sort((a,b)=>(data[b].timestamp||0)-(data[a].timestamp||0));
        if(!keys.length){
            c.innerHTML='<div class="empty">📭 Пока пусто<br><span style="font-size:13px;color:#666;">Станьте первым автором!</span></div>';
            return;
        }
        keys.forEach(k=>{const p=data[k];p.id=k;c.appendChild(renderPost(p));});
    });
}

function renderPost(p){
    const d=document.createElement('div');
    d.className='post';
    const mq=p.marquee?`<div class="post-marquee"><span>${esc(p.marquee)}</span></div>`:'';
    const img=p.img?`<img class="post-img" src="${esc(p.img)}" onclick="window.open(this.src)">`:'';
    const fr=p.link?`<div class="post-frame"><iframe src="${esc(p.link)}" sandbox="allow-scripts allow-same-origin allow-popups"></iframe></div>`:'';
    let btns='';
    if(p.buttons&&p.buttons.length){
        btns='<div class="post-buttons">'+p.buttons.filter(b=>b.url).map(b=>`<a href="${esc(b.url)}" target="_blank">${esc(b.label||'🔗 Перейти')}</a>`).join('')+'</div>';
    }
    let tags='';
    if(p.hashtags&&p.hashtags.length){
        tags='<div class="post-tags">'+p.hashtags.map(t=>`<span>${esc(t)}</span>`).join('')+'</div>';
    }
    let acts='<button onclick="alert(\'❤️ Лайк\')">❤️</button><button onclick="alert(\'💬 Обсуждение\')">💬</button><button onclick="alert(\'🔄 Репост\')">🔄</button>';
    if(IS_ADMIN){
        acts+=`<button class="primary" onclick="openEdit('${p.id}')">✏️ Ред.</button>`;
        acts+=`<button class="danger" onclick="delPost('${p.id}')">🗑</button>`;
    }
    d.innerHTML=`${mq}
        <div class="post-header"><span class="post-author">${esc(p.author||'Аноним')}</span><span class="post-time">${p.time||''}${p.edited?' <span style="color:#555;font-size:11px;">(ред.)</span>':''}</span></div>
        <div class="post-text">${esc(p.text||'')}</div>
        ${img}${btns}${fr}${tags}
        <div class="post-actions">${acts}</div>`;
    return d;
}

// ── ADMIN FORM ──
window.fAddBtn=function(l='',u=''){
    const c=document.getElementById('fBtns');
    const d=document.createElement('div');
    d.className='btn-row';
    d.innerHTML=`<input placeholder="Текст" value="${esc(l)}"><input placeholder="Ссылка" value="${esc(u)}"><button class="remove-btn" onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(d);
};
window.fSubmit=function(){
    const marquee=document.getElementById('fMarquee').value.trim();
    const text=document.getElementById('fText').value.trim();
    const link=document.getElementById('fLink').value.trim();
    const hr=document.getElementById('fHashtags').value.trim();
    const hashtags=hr?hr.split(/\s+/).filter(t=>t.startsWith('#')).slice(0,5):[];
    if(!text&&!link){alert('⚠️ Введите текст или ссылку');return;}
    const buttons=[];
    document.querySelectorAll('#fBtns .btn-row').forEach(g=>{
        const[li,ui]=g.querySelectorAll('input');
        if(ui.value.trim()) buttons.push({label:li.value.trim()||'🔗 Перейти',url:ui.value.trim()});
    });
    const post={author:USER,text:text||'📝',time:now(),timestamp:Date.now(),marquee:marquee||null,link:link||null,buttons,hashtags,img:null,edited:false};
    const ref=db.ref('sites/'+SITE+'/feed_posts');
    if(EDIT_ID){
        ref.child(EDIT_ID).update({...post,edited:true,editedAt:Date.now()}).then(fCancel);
    }else{
        ref.push(post).then(fCancel);
    }
};
window.fCancel=function(){
    ['fMarquee','fText','fLink','fHashtags'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fBtns').innerHTML='';
    document.getElementById('fSubmitBtn').textContent='📤 Опубликовать';
    EDIT_ID=null;
};
window.delPost=function(id){
    if(!confirm('🗑 Удалить пост?'))return;
    db.ref('sites/'+SITE+'/feed_posts/'+id).remove();
};

// ── EDIT ──
window.openEdit=function(id){
    EDIT_ID=id;
    db.ref('sites/'+SITE+'/feed_posts/'+id).once('value',snap=>{
        const p=snap.val();if(!p)return;
        document.getElementById('editMarquee').value=p.marquee||'';
        document.getElementById('editText').value=p.text||'';
        document.getElementById('editLink').value=p.link||'';
        document.getElementById('editHashtags').value=(p.hashtags||[]).join(' ');
        document.getElementById('editBtns').innerHTML='';
        (p.buttons||[]).forEach(b=>editAddBtn(b.label,b.url));
        document.getElementById('editOverlay').classList.add('open');
    });
};
window.closeEdit=function(){
    document.getElementById('editOverlay').classList.remove('open');
    EDIT_ID=null;
};
window.editAddBtn=function(l='',u=''){
    const c=document.getElementById('editBtns');
    const d=document.createElement('div');
    d.className='ebtn-row';
    d.innerHTML=`<input placeholder="Текст" value="${esc(l)}"><input placeholder="Ссылка" value="${esc(u)}"><button class="ebtn-rem" onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(d);
};
window.doSaveEdit=function(){
    if(!EDIT_ID)return;
    const marquee=document.getElementById('editMarquee').value.trim();
    const text=document.getElementById('editText').value.trim();
    const link=document.getElementById('editLink').value.trim();
    const hr=document.getElementById('editHashtags').value.trim();
    const hashtags=hr?hr.split(/\s+/).filter(t=>t.startsWith('#')).slice(0,5):[];
    const buttons=[];
    document.querySelectorAll('#editBtns .ebtn-row').forEach(g=>{
        const[li,ui]=g.querySelectorAll('input');
        if(ui.value.trim()) buttons.push({label:li.value.trim()||'🔗 Перейти',url:ui.value.trim()});
    });
    db.ref('sites/'+SITE+'/feed_posts/'+EDIT_ID).update({
        marquee:marquee||null,text:text||'📝',link:link||null,hashtags,buttons,
        edited:true,editedAt:Date.now()
    }).then(closeEdit);
};
window.doDeleteEdit=function(){
    if(!EDIT_ID||!confirm('🗑 Удалить пост?'))return;
    db.ref('sites/'+SITE+'/feed_posts/'+EDIT_ID).remove();
    closeEdit();
};

// ═══════════════════════════════════════════
// ── INIT ────────────────────────────────────
// ═══════════════════════════════════════════
loadFeed();

// Seed examples if empty
db.ref('sites/'+SITE+'/feed_posts').once('value',snap=>{
    if(snap.exists())return;
    const ex=[
        {author:'📢 Администрация',text:'Добро пожаловать в DeepFeed! Здесь можно делиться новостями, общаться и находить друзей. 🏳️‍🌈',time:'12:00',timestamp:Date.now()-3600000,marquee:'🌟 Добро пожаловать в DeepFeed! Будьте собой! 🌟',link:null,buttons:[{label:'📋 Правила',url:'#'}],hashtags:['#ДоброПожаловать','#Сообщество'],img:null,edited:false},
        {author:'🏳️‍🌈 Организатор',text:'Завтра в 19:00 онлайн-встреча! Обсудим планы на месяц. Все желающие приглашаются!',time:'11:30',timestamp:Date.now()-7200000,marquee:'📅 Онлайн-встреча завтра в 19:00!',link:null,buttons:[{label:'🔗 Подключиться',url:'https://meet.google.com/'}],hashtags:['#Встреча','#Планы'],img:null,edited:false}
    ];
    ex.forEach(p=>db.ref('sites/'+SITE+'/feed_posts').push(p));
});

})();
</script>
</body>
</html>
